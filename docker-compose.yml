# docker-compose.yml (place in project root)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pointercrate
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://pointercrate:postgres@db/postgres
    depends_on:
      - db