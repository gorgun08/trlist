# docker-compose.yml (place in project root)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pointercrate
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://pointercrate:postgres@db/postgres
    depends_on:
      - db